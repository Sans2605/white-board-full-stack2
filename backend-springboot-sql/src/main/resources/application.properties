# ── Server ──────────────────────────────────────────────────────────────
server.port=8080

# ── SQL Database (H2 in-memory — works with zero setup) ─────────────────
# Data is reset every restart. Great for development.
spring.datasource.url=jdbc:h2:mem:whiteboarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 web console (open http://localhost:8080/h2-console in browser)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate — auto-creates tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ── To switch to MySQL, comment out the H2 block above and use this: ────
# spring.datasource.url=jdbc:mysql://localhost:3306/whiteboarddb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# spring.jpa.hibernate.ddl-auto=update

# ── JWT ─────────────────────────────────────────────────────────────────
# Must be 32+ characters for HS256
jwt.secret=your_secret_key_change_this_in_prod!!

# ── Socket.IO (separate port from REST API) ──────────────────────────────
socketio.host=0.0.0.0
socketio.port=9090

# ── CORS ─────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:3000,https://whiteboard-tutorial-eight.vercel.app
